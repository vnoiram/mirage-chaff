<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mirage-chaff admin</title>
<style>
  :root { --bg:#0f1216; --panel:#171c22; --fg:#d7dde3; --mut:#8a95a1; --acc:#4a9df0; --bad:#e0674a; --ok:#4ac07a; --line:#242c34; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:16px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); }
  header b { color:var(--acc); }
  nav { display:flex; gap:4px; flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--mut); padding:6px 10px; border-radius:6px; cursor:pointer; }
  nav button.active, nav button:hover { color:var(--fg); border-color:var(--line); background:var(--bg); }
  main { padding:16px; max-width:1100px; margin:0 auto; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--mut); font-weight:600; }
  .grid { overflow-x:auto; }
  input,select,textarea,button.act { font:inherit; background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:8px; }
  textarea { width:100%; min-height:340px; font-family:ui-monospace,monospace; }
  button.act { cursor:pointer; }
  button.act:hover { border-color:var(--acc); }
  button.danger { border-color:var(--bad); color:var(--bad); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .kv { display:grid; grid-template-columns:180px 1fr; gap:6px 12px; }
  .kv div:nth-child(odd){ color:var(--mut); }
  .pill { padding:1px 7px; border-radius:10px; font-size:12px; border:1px solid var(--line); }
  .a-stub{color:var(--ok)} .a-forward-scrubbed,.a-forward-asis{color:var(--acc)} .a-forward-mimic{color:#c79bf0} .a-passthrough{color:#e0b64a}
  #login { max-width:360px; margin:12vh auto; }
  .msg { color:var(--bad); min-height:20px; }
  .hidden { display:none; }
  h2 { margin:0 0 12px; font-size:16px; }
  small { color:var(--mut); }
</style>
</head>
<body>
<div id="login" class="card hidden">
  <h2>mirage-chaff admin</h2>
  <div class="row" style="flex-direction:column;align-items:stretch">
    <input id="lu" placeholder="username" autocomplete="username">
    <input id="lp" type="password" placeholder="password" autocomplete="current-password">
    <button class="act" onclick="doLogin()">Sign in</button>
    <button id="sso" class="act hidden" onclick="location.href='/api/oidc/login'">Sign in with SSO</button>
    <div id="lmsg" class="msg"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <b>mirage-chaff</b>
    <nav id="nav"></nav>
    <span style="margin-left:auto"></span>
    <small id="who"></small>
    <button class="act" onclick="logout()">Logout</button>
  </header>
  <main id="view"></main>
</div>

<script>
let ME = null;
const api = async (method, path, body) => {
  const opt = { method, headers: {} };
  if (body !== undefined) { opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  if (ME && method!=='GET') opt.headers['X-CSRF-Token']=ME.csrf;
  const r = await fetch(path, opt);
  if (r.status===401) { ME=null; render(); throw new Error('unauthorized'); }
  if (!r.ok) throw new Error(await r.text());
  const ct = r.headers.get('content-type')||'';
  return ct.includes('json') ? r.json() : r.text();
};
const el = (h) => { const d=document.createElement('div'); d.innerHTML=h; return d; };
const esc = (s) => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

document.addEventListener('click', (e) => {
  const b=e.target.closest('button[data-cmd]');
  if(!b) return;
  const d=b.dataset;
  if(d.cmd==='triage') triage(d.domain||'',d.path||'');
  if(d.cmd==='promoteRule') promoteRule(d.id||'');
  if(d.cmd==='downgradeRule') downgradeRule(d.id||'');
  if(d.cmd==='tempAllowDomain') tempAllowDomain(d.domain||'');
  if(d.cmd==='permanentAllowDomain') permanentAllowDomain(d.domain||'',d.path||'');
  if(d.cmd==='rewriteCandidate') rewriteCandidate(d.id||'');
  if(d.cmd==='syncManagedSource') syncManagedSource(d.id||'');
  if(d.cmd==='previewManagedSource') previewManagedSource(d.id||'');
  if(d.cmd==='pendingManagedSource') pendingManagedSource(d.id||'');
  if(d.cmd==='toggleManagedSourceEntries') toggleManagedSourceEntries(d.id||'');
  if(d.cmd==='showMoreManagedSourceEntries') showMoreManagedSourceEntries(d.id||'');
  if(d.cmd==='showMoreManagedSourcePreviewEntries') showMoreManagedSourcePreviewEntries();
  if(d.cmd==='showMoreManagedPendingDiff') showMoreManagedPendingDiff(d.kind||'');
  if(d.cmd==='toggleManagedSource') toggleManagedSource(d.id||'', d.enabled==='true');
  if(d.cmd==='editManagedSourceRow') editManagedSourceRow(d.id||'');
  if(d.cmd==='saveManagedSourceRow') saveManagedSourceRow(d.id||'');
  if(d.cmd==='cancelManagedSourceRow') cancelManagedSourceRow(d.id||'');
  if(d.cmd==='saveManagedSourceSettings') saveManagedSourceSettings(d.id||'');
  if(d.cmd==='approveManagedSource') approveManagedSource(d.id||'');
  if(d.cmd==='rejectManagedSource') rejectManagedSource(d.id||'');
  if(d.cmd==='deleteManagedSource') deleteManagedSource(d.id||'');
  if(d.cmd==='managedRewrite') setManagedRewrite(d.id||'', d.enabled==='true');
  if(d.cmd==='resolveManagedConflict') resolveManagedConflict(d.id||'', d.action||'');
  if(d.cmd==='resolveManagedConflictCustom') resolveManagedConflictCustom(d.id||'');
  if(d.cmd==='selectManagedCatalogVisible') selectManagedCatalogVisible();
  if(d.cmd==='clearManagedCatalogSelection') clearManagedCatalogSelection();
  if(d.cmd==='showMoreManagedCatalogRows') showMoreManagedCatalogRows();
  if(d.cmd==='bulkManagedCatalog') bulkManagedCatalog();
  if(d.cmd==='exportManagedFeedSnapshot') exportManagedFeedSnapshot();
  if(d.cmd==='showMoreManagedFeedPreviewItems') showMoreManagedFeedPreviewItems();
  if(d.cmd==='toggleManagedRollbackDetails') toggleManagedRollbackDetails(d.id||'');
  if(d.cmd==='applyManagedRollback') applyManagedRollback(d.id||'');
  if(d.cmd==='saveManagedPreset') saveManagedPreset();
  if(d.cmd==='refreshAGHFilters') refreshAGHFilters();
  if(d.cmd==='checkManagedAGHStatus') checkManagedAGHStatus();
  if(d.cmd==='useManagedAGHBaseURL') useManagedAGHBaseURL();
  if(d.cmd==='saveManagedTargetConfig') saveManagedTargetConfig();
  if(d.cmd==='saveManagedSchedulerConfig') saveManagedSchedulerConfig();
  if(d.cmd==='applyConfigReload') applyManagedConfigReload(d.scope||'managed config');
  if(d.cmd==='editManagedCatalogRow') editManagedCatalogRow(d.id||'');
  if(d.cmd==='saveManagedCatalogRow') saveManagedCatalogRow(d.id||'');
  if(d.cmd==='cancelManagedCatalogRow') cancelManagedCatalogRow(d.id||'');
  if(d.cmd==='toggleManagedCatalogDetails') toggleManagedCatalogDetails(d.id||'');
  if(d.cmd==='resetPw') resetPw(d.username||'');
  if(d.cmd==='delUser') delUser(d.username||'');
});

async function doLogin(){
  try {
    const u=document.getElementById('lu').value, p=document.getElementById('lp').value;
    await api('POST','/api/login',{username:u,password:p});
    ME = await api('GET','/api/me');
    render();
  } catch(e){ document.getElementById('lmsg').textContent = e.message; }
}
async function logout(){ try{ await api('POST','/api/logout'); }catch{} ME=null; render(); }

const has = (cap) => ME && ME.capabilities && ME.capabilities.includes(cap);
const TABS = [
  ['Dashboard','dashboard.view',viewDashboard],
  ['Traffic','traffic.view',viewTraffic],
  ['Analytics','traffic.view',viewAnalytics],
  ['Rule Catalog','catalog.view',viewRuleCatalog],
  ['AGH Managed','catalog.view',viewAGHManaged],
  ['Curation','policy.view',viewCuration],
  ['Policy','policy.view',viewPolicy],
  ['Config','config.view',viewConfig],
  ['Users','users.manage',viewUsers],
  ['Audit','audit.view',viewAudit],
];
let CUR = 'Dashboard';
let AGH_MANAGED_LAST_BASE_URL = '';
let AGH_MANAGED_EMERGENCY_RESULT = '';
let AGH_MANAGED_REFRESH_RESULT = null;
let AGH_MANAGED_PRESET_RESULT = null;
let AGH_MANAGED_BULK_RESULT = null;
let AGH_MANAGED_ROLLBACK_RESULT = null;
let AGH_MANAGED_SOURCE_RESULT = null;
let AGH_MANAGED_CATALOG_RESULT = null;
let AGH_MANAGED_FEED_PREVIEW_RESULT = null;
let AGH_MANAGED_TARGET_REFRESH_RESULT = null;
let AGH_MANAGED_TARGET_CONFIG_RESULT = null;
let AGH_MANAGED_SCHEDULER_CONFIG_RESULT = null;
let AGH_MANAGED_SOURCE_DETAIL_KIND = '';
let AGH_MANAGED_SOURCE_PREVIEW_RESULT = null;
let AGH_MANAGED_PENDING_DIFF_RESULT = null;
let AGH_MANAGED_REGISTRATION_RESULT = null;
let AGH_MANAGED_FEED_EXPORT_RESULT = null;
let AGH_MANAGED_CONFIG_RELOAD_RESULT = null;

function render(){
  const login=document.getElementById('login'), app=document.getElementById('app');
  if(!ME){ login.classList.remove('hidden'); app.classList.add('hidden'); return; }
  login.classList.add('hidden'); app.classList.remove('hidden');
  document.getElementById('who').textContent = ME.username+' · '+ME.role;
  const nav=document.getElementById('nav'); nav.innerHTML='';
  TABS.filter(t=>has(t[1])).forEach(t=>{
    const b=document.createElement('button'); b.textContent=t[0];
    if(t[0]===CUR) b.className='active';
    b.onclick=()=>{ CUR=t[0]; render(); };
    nav.appendChild(b);
  });
  const tab = TABS.find(t=>t[0]===CUR) || TABS[0];
  document.getElementById('view').innerHTML='';
  tab[2](document.getElementById('view'));
  if(CUR==='AGH Managed'){
    initManagedSourceForm();
    filterManagedSources();
    filterManagedHistory();
    filterManagedRollbacks();
    filterManagedConflicts();
    renderManagedSourcePreviewEntries();
    ['added','removed','changed'].forEach(renderManagedPendingDiffKind);
    restoreManagedSourceEntryRows();
  }
  if(ME.must_change) alert('Please change your temporary password (Users tab / your account).');
}

async function viewDashboard(v){
  const d = await api('GET','/api/dashboard');
  const temp = Object.entries(d.temp_allows||{}).map(([k,t])=>`${esc(k)} → ${esc(new Date(t).toLocaleTimeString())}`).join('<br>')||'<small>none</small>';
  const lis = Object.entries(d.listeners||{}).map(([k,val])=>`<div>${esc(k)}</div><div>${esc(val)}</div>`).join('');
  v.appendChild(el(`<div class="card"><h2>Status</h2><div class="kv">
    <div>version</div><div>${esc(d.version)}</div>
    <div>policy rules</div><div>${d.policy_rules}</div>
    <div>cert key type</div><div>${esc(d.cert_key_type)}</div>
    <div>cert fingerprint</div><div><small>${esc((d.cert_fingerprint||'').slice(0,32))}…</small></div>
    <div>admin users</div><div>${d.users}</div>
    ${lis}
  </div></div>`));
  v.appendChild(el(`<div class="card"><h2>Temporary allows</h2><div>${temp}</div>
    <div class="row" style="margin-top:12px">
      <input id="ta-d" placeholder="domain"><input id="ta-m" type="number" value="15" style="width:80px">min
      <button class="act" onclick="tempAllow()">Allow (pass-through)</button>
    </div></div>`));
  if(has('killswitch.execute'))
    v.appendChild(el(`<div class="card"><h2>Emergency</h2>
      <button class="act danger" onclick="killswitch()">Execute kill-switch (remove AGH rewrites)</button></div>`));
}
async function tempAllow(){ try{
  await api('POST','/api/allow',{domain:document.getElementById('ta-d').value,minutes:+document.getElementById('ta-m').value});
  render();
}catch(e){ alert(e.message);} }
async function killswitch(){ if(!confirm('Remove all cushion AGH rewrites and revert to normal resolution?'))return;
  try{ const r=await api('POST','/api/killswitch'); alert(r.status);}catch(e){alert(e.message);} }

async function viewTraffic(v){
  v.appendChild(el(`<div class="card"><h2>Live traffic <small>(redacted)</small></h2>
    <div class="grid"><table><thead><tr><th>time</th><th>domain</th><th>path</th><th>method</th><th>action</th><th>rule</th><th>catalog</th><th>status</th><th>bytes</th><th></th></tr></thead>
    <tbody id="tbody"></tbody></table></div></div>`));
  const tb=document.getElementById('tbody');
  const add=(r)=>{ const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(new Date(r.time).toLocaleTimeString())}</td><td>${esc(r.domain)}</td><td>${esc(r.path)}</td>
      <td>${esc(r.method)}</td><td class="a-${esc(r.action)}">${esc(r.action)}</td><td>${esc(r.rule||'')}</td><td>${esc(r.category||r.catalog_id||'')}</td><td>${r.status}</td><td>${r.bytes}</td>
      <td></td>`;
    const b=document.createElement('button');
    b.className='act'; b.textContent='triage'; b.dataset.cmd='triage';
    b.dataset.domain=r.domain||''; b.dataset.path=r.path||'';
    tr.lastElementChild.appendChild(b);
    tb.prepend(tr); while(tb.children.length>300) tb.removeChild(tb.lastChild); };
  (await api('GET','/api/traffic')).slice(-100).forEach(add);
  const es=new EventSource('/api/traffic/stream');
  es.onmessage=(e)=>{ try{ add(JSON.parse(e.data)); }catch{} };
  v._cleanup=()=>es.close();
}

async function triage(domain,path){
  const q=new URLSearchParams({domain,path});
  const r=await api('GET','/api/triage/context?'+q.toString());
  alert(JSON.stringify(r,null,2));
}

async function viewAnalytics(v){
  const s=await api('GET','/api/analytics/summary');
  const domains=await api('GET','/api/analytics/domains');
  const rules=await api('GET','/api/analytics/rules');
  const cat=s.catalog||{};
  v.appendChild(el(`<div class="card"><h2>Analytics</h2><div class="kv">
    <div>log mode</div><div>${esc(s.log_mode)}</div>
    <div>requests</div><div>${s.total||0}</div>
    <div>bytes</div><div>${s.bytes||0}</div>
    <div>catalog entries</div><div>${cat.total||0}</div>
  </div></div>`));
  v.appendChild(el(`<div class="card"><h2>Top domains</h2>${rankTable(domains)}</div>`));
  v.appendChild(el(`<div class="card"><h2>Top rules</h2>${rankTable(rules)}</div>`));
  v.appendChild(el(`<div class="card"><h2>Catalog classifications</h2><div class="grid"><table><tbody>
    <tr><th>category</th><td>${esc(JSON.stringify(cat.by_category||{}))}</td></tr>
    <tr><th>risk</th><td>${esc(JSON.stringify(cat.by_risk||{}))}</td></tr>
    <tr><th>review</th><td>${esc(JSON.stringify(cat.by_review_status||{}))}</td></tr>
    <tr><th>source</th><td>${esc(JSON.stringify(cat.by_source_type||{}))}</td></tr>
    <tr><th>resource</th><td>${esc(JSON.stringify(cat.by_resource_type||{}))}</td></tr>
    <tr><th>expected catalog</th><td>${esc(JSON.stringify(cat.by_expected_catalog||{}))}</td></tr>
  </tbody></table></div></div>`));
  v.appendChild(el(`<div class="card"><h2>False-positive candidates</h2>${catalogRows(cat.high_unverified||[])}</div>`));
  v.appendChild(el(`<div class="card"><h2>JS stub candidates</h2>${catalogRows(cat.js_stub_candidates||[])}</div>`));
  v.appendChild(el(`<div class="card"><h2>CNAME candidates</h2>${catalogRows(cat.cname_candidates||[])}</div>`));
}
function rankTable(rows){
  rows=rows||[];
  return `<div class="grid"><table><thead><tr><th>item</th><th>count</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.key)}</td><td>${r.count}</td></tr>`).join('')}</tbody></table></div>`;
}

async function viewRuleCatalog(v){
  const st=await api('GET','/api/agh-sync/status');
  const rows=(await api('GET','/api/rule-catalog')).entries||[];
  v.appendChild(el(`<div class="card"><h2>Rule Catalog</h2><div class="row">
    <span class="pill">${rows.length} entries</span><span class="pill">last sync ${esc(st.last_success?new Date(st.last_success).toLocaleString():'never')}</span>
    ${has('agh.manage')?'<button class="act" onclick="runSync()">Run AGH sync</button>':''}
  </div></div>`));
  v.appendChild(el(`<div class="card"><div class="grid"><table><thead><tr><th>domain</th><th>path</th><th>category</th><th>risk</th><th>review</th><th>verified</th><th>source</th><th>expected</th><th></th></tr></thead><tbody>
    ${rows.slice(0,500).map(r=>`<tr><td>${esc(r.match?.domain)}</td><td>${esc(r.match?.path||'')}</td><td>${esc(r.category)}</td><td>${esc(r.risk)}</td><td>${esc(r.review_status)}</td><td>${r.verified?'yes':'no'}</td><td>${esc(r.source?.type)}</td><td>${esc(r.expected_catalog||'')}</td>
    <td>${catalogActions(r)}</td></tr>`).join('')}
  </tbody></table></div></div>`));
}
async function runSync(){ try{ const r=await api('POST','/api/agh-sync/run'); alert(JSON.stringify(r,null,2)); render(); }catch(e){ alert(e.message);} }
async function reviewRule(id,status,verified){ try{ await api('POST','/api/rule-catalog/'+id+'/review',{review_status:status,verified}); render(); }catch(e){ alert(e.message);} }
async function promoteRule(id){ try{ await api('POST','/api/rule-catalog/'+id+'/promote'); render(); }catch(e){ alert(e.message);} }
async function downgradeRule(id){ try{ await api('POST','/api/rule-catalog/'+id+'/downgrade'); render(); }catch(e){ alert(e.message);} }
async function tempAllowDomain(domain){ try{ await api('POST','/api/triage/temp-allow',{domain,minutes:15}); render(); }catch(e){ alert(e.message);} }
async function permanentAllowDomain(domain,path){ try{ const r=await api('POST','/api/triage/permanent-allow',{domain,path,action:'forward-asis'}); alert(r.note||'saved'); }catch(e){ alert(e.message);} }
async function rewriteCandidate(id){ try{ const r=await api('POST','/api/agh/rewrite-candidate',{id}); alert(JSON.stringify(r,null,2)); }catch(e){ alert(e.message);} }
function catalogActions(r){
  if(!has('catalog.edit') && !has('allow.temp')) return '';
  const id=esc(r.id), domain=esc(r.match?.domain||''), path=esc(r.match?.path||'');
  let b='';
  if(has('catalog.edit')) b+=`<button class="act" data-cmd="promoteRule" data-id="${id}">promote</button><button class="act" data-cmd="downgradeRule" data-id="${id}">downgrade</button>`;
  if(has('allow.temp')) b+=`<button class="act" data-cmd="tempAllowDomain" data-domain="${domain}">temp allow</button>`;
  if(has('policy.edit')) b+=`<button class="act" data-cmd="permanentAllowDomain" data-domain="${domain}" data-path="${path}">permanent</button>`;
  if(has('agh.manage')) b+=`<button class="act" data-cmd="rewriteCandidate" data-id="${id}">AGH candidate</button>`;
  return b;
}
function catalogRows(rows){
  rows=rows||[];
  return `<div class="grid"><table><thead><tr><th>domain</th><th>resource</th><th>risk</th><th>review</th><th>expected</th><th>stub</th><th>cname</th><th></th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.match?.domain)}</td><td>${esc(r.resource_type||'')}</td><td>${esc(r.risk||'')}</td><td>${esc(r.review_status||'')}</td><td>${esc(r.expected_catalog||'')}</td><td>${esc(r.stub_template||'')}</td><td>${esc(r.cname_target||'')}</td><td>${catalogActions(r)}</td></tr>`).join('')}
  </tbody></table></div>`;
}
function optionHTML(value,current,label){
  return `<option value="${esc(value)}" ${String(current??'')===String(value)?'selected':''}>${esc(label||value)}</option>`;
}
function managedSourceByID(id){ return (window.AGH_MANAGED_SOURCES||[]).find(s=>s.id===id); }
function managedSourceTrace(ids){
  return (ids||[]).map(id=>{
    const s=managedSourceByID(id)||{};
    const name=s.name&&s.name!==id?` ${esc(s.name)}`:'';
    const type=s.type?` (${esc(s.type)})`:'';
    const url=s.url?` <small>${esc(s.url)}</small>`:'';
    return `<div><code>${esc(id)}</code>${name}${type}${url}</div>`;
  }).join('')||'<span class="muted">none</span>';
}
function managedSourceTraceRefs(refs,ids){
  if((refs||[]).length){
    return refs.map(s=>{
      const id=s.id||'';
      const name=s.name&&s.name!==id?` ${esc(s.name)}`:'';
      const type=s.type?` (${esc(s.type)})`:'';
      const url=s.url?` <small>${esc(s.url)}</small>`:'';
      const priority=s.priority?` priority ${Number(s.priority)}`:'';
      return `<div><code>${esc(id)}</code>${name}${type}${url}${priority}</div>`;
    }).join('');
  }
  return managedSourceTrace(ids||[]);
}
function managedSourceTraceSearch(ids){
  return (ids||[]).map(id=>{
    const s=managedSourceByID(id)||{};
    return [id,s.name,s.type,s.url].join(' ');
  }).join(' ');
}
function managedSourceTraceRefSearch(refs,ids){
  if((refs||[]).length) return refs.map(s=>[s.id,s.name,s.type,s.url,s.priority].join(' ')).join(' ');
  return managedSourceTraceSearch(ids||[]);
}
function managedCatalogDetailRow(r){
  const id=esc(r.id);
  return `<tr class="agh-cat-detail" data-managed-detail="${id}"><td></td><td colspan="16"><div class="kv">
    <div>entry id</div><div>${id}</div>
    <div>source trace</div><div>${managedSourceTraceRefs(r.source_refs,r.source_ids||[r.source?.name].filter(Boolean))}</div>
    <div>source priority</div><div>${Number(r.source_priority||0)}</div>
    <div>original_rule</div><div>${esc(r.original_rule||'')}</div>
    <div>match</div><div>${esc(r.match?.domain||'')}${r.match?.path?esc(' '+r.match.path):''}</div>
    <div>layer</div><div>${esc(r.layer||'')}</div>
    <div>unsupported</div><div>${r.unsupported?'yes':'no'}</div>
    <div>classification</div><div>${esc([r.category,r.resource_type,r.risk,r.review_status,r.confidence].filter(Boolean).join(' / '))}</div>
    <div>verified</div><div>${r.verified?'yes':'no'}</div>
    <div>expected catalog</div><div>${esc(r.expected_catalog||'')}</div>
    <div>action</div><div>${esc(r.action||'')}</div>
    <div>notes</div><div>${esc(r.notes||'')}</div>

function managedSourceTypeConfig(type){
  if(type==='manual') return {url:false, content:true, urlPlaceholder:'not used for manual source', contentPlaceholder:'manual domains or rules'};
  if(type==='agh_custom_rules') return {url:true, content:false, urlPlaceholder:'AGH base URL for custom rules', contentPlaceholder:'not used for AGH custom rules'};
  if(type==='agh_query_log_cname') return {url:true, content:false, urlPlaceholder:'AGH base URL for query log CNAME', contentPlaceholder:'not used for AGH query log CNAME'};
  return {url:true, content:false, urlPlaceholder:'filter URL', contentPlaceholder:'not used for filter URL'};
}
function filterManagedSources(){
  const filter=(document.getElementById('agh-source-health-filter')?.value||'').toLowerCase();
  const rows=[...document.querySelectorAll('tr[data-managed-source]')];
  let visible=0;
  rows.forEach(row=>{
    const health=(row.dataset.sourceHealth||'never synced').toLowerCase();
    const show=!filter||health===filter;
    row.style.display=show?'':'none';
    if(show) visible++;
  });
  const out=document.getElementById('agh-source-count');
  if(out) out.textContent=`${visible} / ${rows.length} sources`;
}
function initManagedSourceForm(){
  const type=document.getElementById('agh-src-type');
  if(!type) return;
  type.onchange=updateManagedSourceTypeFields;
  updateManagedSourceTypeFields();
}
function updateManagedSourceTypeFields(){
  const type=document.getElementById('agh-src-type')?.value||'filter_url';
  const cfg=managedSourceTypeConfig(type);
  const url=document.getElementById('agh-src-url');
  const content=document.getElementById('agh-src-content');
  const useAGHURL=document.querySelector('[data-cmd="useManagedAGHBaseURL"]');
  if(url){
    url.disabled=!cfg.url;
    url.placeholder=cfg.urlPlaceholder;
    url.required=!!cfg.url;
    if(!cfg.url) url.value='';
    if(cfg.url&&type!=='filter_url'&&!url.value&&AGH_MANAGED_LAST_BASE_URL) url.value=AGH_MANAGED_LAST_BASE_URL;
  }
  if(content){
    content.disabled=!cfg.content;
    content.placeholder=cfg.contentPlaceholder;
    content.required=!!cfg.content;
    if(!cfg.content) content.value='';
  }
  if(useAGHURL){
    useAGHURL.disabled=!(type==='agh_custom_rules'||type==='agh_query_log_cname');
    useAGHURL.title=AGH_MANAGED_LAST_BASE_URL||'run AGH registration check first';
  }
}
function managedSourceFormValue(id){ return (document.getElementById(id)?.value||'').trim(); }
function useManagedAGHBaseURL(){
  const type=document.getElementById('agh-src-type')?.value||'';
  if(type!=='agh_custom_rules'&&type!=='agh_query_log_cname') return;
  const url=document.getElementById('agh-src-url');
  if(url&&AGH_MANAGED_LAST_BASE_URL) url.value=AGH_MANAGED_LAST_BASE_URL;
}
function setManagedSourceResult(r){
  AGH_MANAGED_SOURCE_RESULT=r;
  const out=document.getElementById('agh-source-result');
  if(out) out.innerHTML=managedSourceOperationResultHTML(r);
}
function managedSourceOperationError(action,e){
  setManagedSourceResult({action,error:e.message});
  if(!document.getElementById('agh-source-result')) alert(e.message);
}
async function addManagedSource(){ try{
  const type=document.getElementById('agh-src-type').value;
  const cfg=managedSourceTypeConfig(type);
  const url=managedSourceFormValue('agh-src-url');
  const content=managedSourceFormValue('agh-src-content');
  if(cfg.url&&!url) throw new Error(type==='filter_url'?'url required':'agh base url required');
  if(cfg.content&&!content) throw new Error('content required');
  const body={type,name:managedSourceFormValue('agh-src-name'),enabled:true,priority:Number(document.getElementById('agh-src-priority')?.value||0),stale_feed_policy:document.getElementById('agh-src-stale-policy')?.value||'exclude',sync_interval:managedSourceFormValue('agh-src-interval')};
  if(cfg.content) body.content=content;
  if(cfg.url) body.url=url;
  setManagedSourceResult({action:'add source',running:true});
  const src=await api('POST','/api/agh/sources',body);
  AGH_MANAGED_SOURCE_RESULT={action:'add source',source:src};
  render();
}catch(e){ managedSourceOperationError('add source',e);} }
async function syncManagedSource(id){ try{
  setManagedSourceResult({action:'sync source',id,running:true});
  const src=await api('POST','/api/agh/sources/'+id+'/sync');
  AGH_MANAGED_SOURCE_RESULT={action:'sync source',source:src};
  render();
}catch(e){ managedSourceOperationError('sync source',e);} }
async function previewManagedSource(id){ try{
  const s=(window.AGH_MANAGED_SOURCES||[]).find(x=>x.id===id);
  AGH_MANAGED_SOURCE_DETAIL_KIND='preview';
  AGH_MANAGED_SOURCE_PREVIEW_RESULT={source:s,previewing:true};
  const detail=document.getElementById('agh-source-detail');
  if(detail) detail.innerHTML=managedSourceDetailHTML();
  const r=await api('POST','/api/agh/sources/preview?limit=100&offset=0',s);
  window.AGH_MANAGED_SOURCE_PREVIEW_STATE={source:s,entries:r.entries||[],total:Number(r.total??(r.entries||[]).length),limit:100,filter:''};
  AGH_MANAGED_SOURCE_PREVIEW_RESULT={source:r.source||s,entries:r.entries||[],total:Number(r.total??(r.entries||[]).length)};
  if(detail) detail.innerHTML=managedSourceDetailHTML();
  renderManagedSourcePreviewEntries();
}catch(e){
  AGH_MANAGED_SOURCE_DETAIL_KIND='preview';
  AGH_MANAGED_SOURCE_PREVIEW_RESULT={error:e.message};
  const detail=document.getElementById('agh-source-detail');
  if(detail) detail.innerHTML=managedSourceDetailHTML();
  else alert(e.message);
} }

function restoreManagedSourceEntryRows(){
  const states=window.AGH_SOURCE_ENTRY_STATE||{};
  Object.keys(states).forEach(id=>{
    const state=states[id];
    if(!state||!state.expanded) return;
    const tr=document.querySelector(`tr[data-managed-source="${CSS.escape(id)}"]`);
    if(!tr) return;
    if(!document.querySelector(`tr[data-managed-source-entries="${CSS.escape(id)}"]`)) tr.insertAdjacentHTML('afterend',managedSourceEntriesRow(id,state.entries||[]));
    const b=tr.querySelector(`button[data-cmd="toggleManagedSourceEntries"]`);
    if(b) b.textContent='hide';
    renderManagedSourceEntries(id);
  });
}
function managedSourceEntrySearch(r){
  return [r.match?.domain,r.match?.path,managedSourceTraceRefSearch(r.source_refs,r.source_ids||[]),r.category,r.resource_type,r.review_status,r.rewrite_enabled?'rewrite':'no-rewrite',r.rewrite_reason,r.original_rule,r.last_feed_included_at].join(' ').toLowerCase();
}
function managedSourceEntryQuery(id,offset,limit){
  const params=new URLSearchParams();
  const q=document.getElementById(`agh-source-entry-filter-${id}`)?.value||'';
  if(q) params.set('q',q);
  params.set('limit',String(limit||200));
  params.set('offset',String(offset||0));
  return params.toString();
}
async function fetchManagedSourceEntries(id,reset){
  const state=window.AGH_SOURCE_ENTRY_STATE?.[id];
  if(!state) return;
  const offset=reset?0:(state.entries||[]).length;
  const r=await api('GET','/api/agh/sources/'+id+'/entries?'+managedSourceEntryQuery(id,offset,state.limit||200));
  const entries=r.entries||[];
  state.entries=reset?entries:(state.entries||[]).concat(entries);
  state.total=Number(r.total??state.entries.length);
  state.source=r.source||state.source||{};
  state.expanded=true;
  state.loading=false;
  state.error='';
  state.filter=document.getElementById(`agh-source-entry-filter-${id}`)?.value||'';
  renderManagedSourceEntries(id);
}
function renderManagedSourceEntries(id){
  const state=window.AGH_SOURCE_ENTRY_STATE?.[id];
  const body=document.getElementById(`agh-source-entry-body-${id}`);
  if(!state||!body) return;
  const shown=state.entries||[];
  body.innerHTML=shown.map(r=>`<tr><td>${esc(r.match?.domain||'')}</td><td>${managedSourceTraceRefs(r.source_refs,r.source_ids||[])}</td><td>${Number(r.source_priority||0)}</td><td>${esc(r.category||'')}</td><td>${esc(r.resource_type||'')}</td><td>${esc(r.review_status||'')}</td><td>${r.rewrite_enabled?'yes':'no'}</td><td>${esc(r.rewrite_reason||'')}</td><td>${esc(r.last_feed_included_at?new Date(r.last_feed_included_at).toLocaleString():'')}</td><td>${esc(r.original_rule||'')}</td></tr>`).join('')||`<tr><td colspan="10" class="muted">none</td></tr>`;
  const status=document.getElementById(`agh-source-entry-status-${id}`);
  if(status) status.innerHTML=managedSourceEntriesResultHTML(state);
  const count=document.getElementById(`agh-source-entry-count-${id}`);
  if(count) count.textContent=`showing ${shown.length} of ${Number(state.total||0)} matching / ${(state.entries||[]).length} loaded`;
}
async function filterManagedSourceEntries(id){
  const state=window.AGH_SOURCE_ENTRY_STATE?.[id];
  if(!state) return;
  state.filter=document.getElementById(`agh-source-entry-filter-${id}`)?.value||'';
  state.entries=[];
  await fetchManagedSourceEntries(id,true);
}
async function showMoreManagedSourceEntries(id){
  const state=window.AGH_SOURCE_ENTRY_STATE?.[id];

  await fetchManagedSourceEntries(id,false);
}

  const notes=(document.getElementById('agh-bulk-notes')?.value||'').trim();
  const reason=(document.getElementById('agh-bulk-reason')?.value||'').trim();
  if(rewrite) override.rewrite_enabled=rewrite==='true';
  if(review) override.review_status=review;
  if(risk) override.risk=risk;
  if(confidence) override.confidence=confidence;
  if(verified) override.verified=verified==='true';
  if(category) override.category=category;
  if(resource) override.resource_type=resource;
  if(expected) override.expected_catalog=expected;
  if(action) override.action=action;
  if(notes) override.notes=notes;

async function refreshAGHFilters(){ try{

function managedAGHRefreshResultHTML(r){
  if(!r) return '';
  if(r.error) return `<div id="agh-refresh-status">error: ${esc(r.error)}</div>`;
  const rows=[
    ['status',r.status||'ok'],
    ['base URL',r.base_url||''],
    ['force',r.force?'yes':'no'],
    ['verify','Check AGH registration or preview the feed']
  ];
  return `<div id="agh-refresh-status"><strong>refreshed</strong><div class="kv">${rows.map(x=>`<div>${esc(x[0])}</div><div>${esc(x[1])}</div>`).join('')}</div></div>`;
}
function managedAGHCheckSummary(raw){
  if(!raw) return '';
  const keys=['reason','rule','service_name','filter_name','filter_id'];
  return keys.filter(k=>raw[k]!==undefined&&raw[k]!==null&&raw[k]!=='').map(k=>`${k}: ${raw[k]}`).join(' / ');
}
function managedAGHRegistrationStatusLine(r){
  if(!r) return 'not checked';
  if(r.registered&&r.enabled) return 'registered and enabled';
  if(r.registered) return 'registered but disabled';
  return 'not registered';
}
function managedAGHMatchedFilterText(f){
  if(!f) return 'none';
  if(f.name) return `${f.name} (#${f.id||''})`;
  return f.url||'none';
}
function managedAGHRegistrationStatusHTML(r){
  if(!r) return `<div id="agh-registration-status">not checked</div>`;
  const check=r.check_result||{};
  const raw=check.raw||{};
  const rows=[
    ['status',managedAGHRegistrationStatusLine(r)],
    ['base URL',r.base_url||''],
    ['feed URL',r.feed_url||''],
    ['registered',r.registered?'yes':'no'],
    ['enabled',r.enabled?'yes':'no'],
    ['matched filter',managedAGHMatchedFilterText(r.matched_filter)],
    ['check_host',r.check_domain?`${r.check_domain}: ${managedAGHCheckSummary(raw)||JSON.stringify(raw)}`:(r.message||'not run')]
  ];
  return `<div id="agh-registration-status"><strong>${esc(managedAGHRegistrationStatusLine(r))}</strong><div class="kv">${rows.map(x=>`<div>${esc(x[0])}</div><div>${esc(x[1])}</div>`).join('')}</div></div>`;
}
function managedAGHRegistrationResultHTML(r){
  if(!r) return managedAGHRegistrationStatusHTML(null);
  if(r.error) return `<div id="agh-registration-status">error: ${esc(r.error)}</div>`;
  if(r.checking) return `<div id="agh-registration-status">checking AGH registration...</div>`;
  return managedAGHRegistrationStatusHTML(r);
}
async function checkManagedAGHStatus(){ try{

  const out=document.getElementById('agh-registration-result');
  if(out) out.innerHTML=managedAGHRegistrationResultHTML(AGH_MANAGED_REGISTRATION_RESULT);
  const r=await api('GET','/api/agh/rewrite-feed/agh-status');
  AGH_MANAGED_REGISTRATION_RESULT=r;
  AGH_MANAGED_LAST_BASE_URL = r.base_url||AGH_MANAGED_LAST_BASE_URL;
  updateManagedSourceTypeFields();
  if(out) out.innerHTML=managedAGHRegistrationResultHTML(AGH_MANAGED_REGISTRATION_RESULT);
}catch(e){
  AGH_MANAGED_REGISTRATION_RESULT={error:e.message};
  const out=document.getElementById('agh-registration-result');
  if(out) out.innerHTML=managedAGHRegistrationResultHTML(AGH_MANAGED_REGISTRATION_RESULT);
  else alert(e.message);
} }
function managedExportFilename(disposition){
  const m=String(disposition||'').match(/filename="([^"]+)"/i);
  return m?m[1]:'mirage-chaff-managed-rewrites.txt';
}
function downloadManagedBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
async function exportManagedFeedSnapshot(){ try{
  AGH_MANAGED_FEED_EXPORT_RESULT={exporting:true};
  const out=document.getElementById('agh-feed-export-result');
  if(out) out.innerHTML=managedFeedExportResultHTML(AGH_MANAGED_FEED_EXPORT_RESULT);
  const r=await fetch('/api/agh/rewrite-feed/export',{headers:ME?{'X-CSRF-Token':ME.csrf}:{}});
  if(!r.ok) throw new Error(await r.text());
  const text=await r.text();
  const filename=managedExportFilename(r.headers.get('content-disposition'));
  downloadManagedBlob(new Blob([text],{type:r.headers.get('content-type')||'text/plain'}),filename);
  AGH_MANAGED_FEED_EXPORT_RESULT={filename,bytes:text.length,lines:text.split(/\n/).length};
  if(out) out.innerHTML=managedFeedExportResultHTML(AGH_MANAGED_FEED_EXPORT_RESULT);
}catch(e){
  AGH_MANAGED_FEED_EXPORT_RESULT={error:e.message};
  const out=document.getElementById('agh-feed-export-result');
  if(out) out.innerHTML=managedFeedExportResultHTML(AGH_MANAGED_FEED_EXPORT_RESULT);
  else alert(e.message);
} }
async function applyManagedRollback(id){ if(!confirm('Apply rollback '+id+'?'))return; try{

}catch(e){
  AGH_MANAGED_ROLLBACK_RESULT={id,error:e.message};

function managedFeedPreviewDiagnostics(p){
  const st=p.status||{};
  return `<div class="kv" style="margin-bottom:10px">
    <div>target output</div><div>${esc(managedTargetState(st))}</div>
    <div>target mode</div><div>${esc(st.target_mode||'resolved_ip')}</div>
    <div>default preset</div><div>${esc(st.default_preset||'balanced')}</div>
    <div>preview counts</div><div>${Number(st.item_count||0)} included / ${Number(st.excluded_count||0)} excluded / ${Number(st.conflict_count||0)} conflicts</div>
  </div>`;
}
function managedFeedItemLineCount(i){ return (i.lines||[]).length; }
function managedFeedPreviewItemSearch(i){
  return [i.domain,managedSourceTraceRefSearch(i.source_refs,i.source_ids||[]),i.reason,i.category,i.resource_type,i.review_status,i.rewrite_enabled?'rewrite':'no-rewrite',i.included?'included':'excluded'].join(' ').toLowerCase();
}
function managedFeedPreviewTable(items){
  return `<div class="row"><input id="agh-feed-preview-filter" oninput="filterManagedFeedPreviewItems()" placeholder="filter feed preview domain/source/reason/category/resource/review"><select id="agh-feed-preview-included" onchange="filterManagedFeedPreviewItems()"><option value="">included</option><option value="true">included only</option><option value="false">excluded only</option></select><button class="act" data-cmd="showMoreManagedFeedPreviewItems">show more</button><span id="agh-feed-preview-count" class="muted"></span></div><h3>feed items</h3><div class="grid"><table><thead><tr><th>domain</th><th>included</th><th>reason</th><th>source trace</th><th>category</th><th>resource_type</th><th>review_status</th><th>rewrite</th><th>lines</th></tr></thead><tbody id="agh-feed-preview-body"></tbody></table></div>`;
}
function managedFeedPreviewQuery(offset,limit){
  const params=new URLSearchParams();
  const q=document.getElementById('agh-feed-preview-filter')?.value||'';
  const included=document.getElementById('agh-feed-preview-included')?.value||'';
  if(q) params.set('q',q);
  if(included) params.set('included',included);
  params.set('limit',String(limit||500));
  params.set('offset',String(offset||0));
  return params.toString();
}
async function fetchManagedFeedPreviewItems(reset){
  const state=window.AGH_MANAGED_FEED_PREVIEW_STATE;
  if(!state) return;
  const offset=reset?0:(state.items||[]).length;
  const p=await api('GET','/api/agh/rewrite-feed/preview?'+managedFeedPreviewQuery(offset,state.limit||500));
  const items=p.items||[];
  state.items=reset?items:(state.items||[]).concat(items);
  state.total=Number(p.total??state.items.length);
  state.status=p.status||state.status||{};
  state.lines=p.lines||state.lines||'';
  renderManagedFeedPreviewItems();
}
function renderManagedFeedPreviewItems(){
  const state=window.AGH_MANAGED_FEED_PREVIEW_STATE;
  const body=document.getElementById('agh-feed-preview-body');
  if(!state||!body) return;
  const shown=state.items||[];
  body.innerHTML=shown.map(i=>`<tr><td>${esc(i.domain)}</td><td>${i.included?'yes':'no'}</td><td>${esc(i.reason)}</td><td>${managedSourceTraceRefs(i.source_refs,i.source_ids||[])}</td><td>${esc(i.category||'')}</td><td>${esc(i.resource_type||'')}</td><td>${esc(i.review_status||'')}</td><td>${i.rewrite_enabled?'yes':'no'}</td><td>${managedFeedItemLineCount(i)}</td></tr>`).join('')||'<tr><td colspan="9" class="muted">none</td></tr>';
  const count=document.getElementById('agh-feed-preview-count');
  if(count) count.textContent=`showing ${shown.length} of ${Number(state.total||0)} matching / ${(state.items||[]).length} loaded`;
}
async function filterManagedFeedPreviewItems(){
  const state=window.AGH_MANAGED_FEED_PREVIEW_STATE;
  if(!state) return;
  state.items=[];
  await fetchManagedFeedPreviewItems(true);
}
async function showMoreManagedFeedPreviewItems(){
  const state=window.AGH_MANAGED_FEED_PREVIEW_STATE;
  if(!state) return;
  if((state.items||[]).length>=Number(state.total||0)) return;
  await fetchManagedFeedPreviewItems(false);
}
async function previewManagedFeed(){ try{
  const out=document.getElementById('agh-feed-preview-result');

  if(out) out.innerHTML=managedFeedPreviewResultHTML(AGH_MANAGED_FEED_PREVIEW_RESULT);

  window.AGH_MANAGED_FEED_PREVIEW_STATE={items:p.items||[],total:Number(p.total??(p.items||[]).length),limit:500,status:p.status||{},lines:p.lines||''};
  document.getElementById('agh-feed').textContent=p.lines||'';

function managedCatalogFilterParams(){
  const params=new URLSearchParams();
  const q=document.getElementById('agh-cat-filter')?.value||'';
  const source=document.getElementById('agh-cat-source')?.value||'';
  const category=document.getElementById('agh-cat-category')?.value||'';
  const resource=document.getElementById('agh-cat-resource')?.value||'';
  const review=document.getElementById('agh-cat-review')?.value||'';
  const rewrite=document.getElementById('agh-cat-rewrite')?.value||'';
  const unsupported=document.getElementById('agh-cat-unsupported')?.value||'';
  if(q) params.set('q',q);
  if(source) params.set('source',source);
  if(category) params.set('category',category);
  if(resource) params.set('resource_type',resource);
  if(review) params.set('review_status',review);
  if(rewrite) params.set('rewrite_enabled',rewrite);
  if(unsupported) params.set('unsupported',unsupported);
  return params;
}
function managedCatalogQuery(offset,limit){
  const params=managedCatalogFilterParams();
  params.set('limit',String(limit||500));
  params.set('offset',String(offset||0));
  return params.toString();
}
function managedCatalogFacetsQuery(){
  return managedCatalogFilterParams().toString();
}
async function fetchManagedCatalogRows(reset){
  const state=window.AGH_MANAGED_CATALOG_STATE;
  if(!state) return;
  const offset=reset?0:(state.rows||[]).length;
  const page=await api('GET','/api/agh/managed-catalog?'+managedCatalogQuery(offset,state.limit||500));
  const rows=page.entries||[];
  state.rows=reset?rows:(state.rows||[]).concat(rows);
  state.total=Number(page.total??state.rows.length);
  window.AGH_MANAGED_ROWS=state.rows;
  renderManagedCatalogRows();
}
function managedCatalogSetFilterOptions(id,label,values){
  const select=document.getElementById(id);
  if(!select) return;
  const selected=select.value||'';
  select.innerHTML=managedCatalogFilterSelect(id,label,values,selected).replace(/^<select[^>]*>|<\/select>$/g,'');
  select.value=selected;
}
function renderManagedCatalogFacets(){
  const state=window.AGH_MANAGED_CATALOG_STATE;
  const facets=state?.facets||{};
  managedCatalogSetFilterOptions('agh-cat-source','source',facets.sources||[]);
  managedCatalogSetFilterOptions('agh-cat-category','category',facets.categories||[]);
  managedCatalogSetFilterOptions('agh-cat-resource','resource',facets.resource_types||[]);
  managedCatalogSetFilterOptions('agh-cat-review','review',facets.review_statuses||[]);
  const unsupported=document.getElementById('agh-cat-unsupported');
  if(unsupported){
    const selected=unsupported.value||'';
    unsupported.innerHTML=`<option value="">unsupported: ${Number(facets.unsupported_count||0)}</option>${optionHTML('true',selected,'unsupported only')}${optionHTML('false',selected,'supported only')}`;
    unsupported.value=selected;
  }
}
async function fetchManagedCatalogFacets(){
  const state=window.AGH_MANAGED_CATALOG_STATE;
  if(!state) return;
  const query=managedCatalogFacetsQuery();
  state.facets=await api('GET','/api/agh/managed-catalog/facets'+(query?'?'+query:''));
  renderManagedCatalogFacets();
}
function renderManagedCatalogRows(){
  const state=window.AGH_MANAGED_CATALOG_STATE;

  if(!state||!body) return;
  const shown=state.rows||[];
  body.innerHTML=shown.map(r=>managedCatalogRow(r,false)).join('')||'<tr><td colspan="17" class="muted">none</td></tr>';
  const count=document.getElementById('agh-cat-count');

}
async function filterManagedCatalog(){
  const state=window.AGH_MANAGED_CATALOG_STATE;

async function showMoreManagedCatalogRows(){
