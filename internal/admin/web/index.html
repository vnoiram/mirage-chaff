<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>mirage-chaff admin</title>
<style>
  :root { --bg:#0f1216; --panel:#171c22; --fg:#d7dde3; --mut:#8a95a1; --acc:#4a9df0; --bad:#e0674a; --ok:#4ac07a; --line:#242c34; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
  header { display:flex; align-items:center; gap:16px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); }
  header b { color:var(--acc); }
  nav { display:flex; gap:4px; flex-wrap:wrap; }
  nav button { background:none; border:1px solid transparent; color:var(--mut); padding:6px 10px; border-radius:6px; cursor:pointer; }
  nav button.active, nav button:hover { color:var(--fg); border-color:var(--line); background:var(--bg); }
  main { padding:16px; max-width:1100px; margin:0 auto; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:16px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--mut); font-weight:600; }
  .grid { overflow-x:auto; }
  input,select,textarea,button.act { font:inherit; background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:6px; padding:8px; }
  textarea { width:100%; min-height:340px; font-family:ui-monospace,monospace; }
  button.act { cursor:pointer; }
  button.act:hover { border-color:var(--acc); }
  button.danger { border-color:var(--bad); color:var(--bad); }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .kv { display:grid; grid-template-columns:180px 1fr; gap:6px 12px; }
  .kv div:nth-child(odd){ color:var(--mut); }
  .pill { padding:1px 7px; border-radius:10px; font-size:12px; border:1px solid var(--line); }
  .a-stub{color:var(--ok)} .a-forward-scrubbed,.a-forward-asis{color:var(--acc)} .a-forward-mimic{color:#c79bf0} .a-passthrough{color:#e0b64a}
  #login { max-width:360px; margin:12vh auto; }
  .msg { color:var(--bad); min-height:20px; }
  .hidden { display:none; }
  h2 { margin:0 0 12px; font-size:16px; }
  small { color:var(--mut); }
</style>
</head>
<body>
<div id="login" class="card hidden">
  <h2>mirage-chaff admin</h2>
  <div class="row" style="flex-direction:column;align-items:stretch">
    <input id="lu" placeholder="username" autocomplete="username">
    <input id="lp" type="password" placeholder="password" autocomplete="current-password">
    <button class="act" onclick="doLogin()">Sign in</button>
    <button id="sso" class="act hidden" onclick="location.href='/api/oidc/login'">Sign in with SSO</button>
    <div id="lmsg" class="msg"></div>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <b>mirage-chaff</b>
    <nav id="nav"></nav>
    <span style="margin-left:auto"></span>
    <small id="who"></small>
    <button class="act" onclick="logout()">Logout</button>
  </header>
  <main id="view"></main>
</div>

<script>
let ME = null;
const api = async (method, path, body) => {
  const opt = { method, headers: {} };
  if (body !== undefined) { opt.headers['Content-Type']='application/json'; opt.body=JSON.stringify(body); }
  if (ME && method!=='GET') opt.headers['X-CSRF-Token']=ME.csrf;
  const r = await fetch(path, opt);
  if (r.status===401) { ME=null; render(); throw new Error('unauthorized'); }
  if (!r.ok) throw new Error(await r.text());
  const ct = r.headers.get('content-type')||'';
  return ct.includes('json') ? r.json() : r.text();
};
const el = (h) => { const d=document.createElement('div'); d.innerHTML=h; return d; };
const esc = (s) => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

document.addEventListener('click', (e) => {
  const b=e.target.closest('button[data-cmd]');
  if(!b) return;
  const d=b.dataset;
  if(d.cmd==='triage') triage(d.domain||'',d.path||'');
  if(d.cmd==='promoteRule') promoteRule(d.id||'');
  if(d.cmd==='downgradeRule') downgradeRule(d.id||'');
  if(d.cmd==='tempAllowDomain') tempAllowDomain(d.domain||'');
  if(d.cmd==='permanentAllowDomain') permanentAllowDomain(d.domain||'',d.path||'');
  if(d.cmd==='rewriteCandidate') rewriteCandidate(d.id||'');
  if(d.cmd==='syncManagedSource') syncManagedSource(d.id||'');
  if(d.cmd==='previewManagedSource') previewManagedSource(d.id||'');
  if(d.cmd==='pendingManagedSource') pendingManagedSource(d.id||'');
  if(d.cmd==='toggleManagedSource') toggleManagedSource(d.id||'', d.enabled==='true');
  if(d.cmd==='approveManagedSource') approveManagedSource(d.id||'');
  if(d.cmd==='rejectManagedSource') rejectManagedSource(d.id||'');
  if(d.cmd==='deleteManagedSource') deleteManagedSource(d.id||'');
  if(d.cmd==='managedRewrite') setManagedRewrite(d.id||'', d.enabled==='true');
  if(d.cmd==='resolveManagedConflict') resolveManagedConflict(d.id||'', d.action||'');
  if(d.cmd==='resetPw') resetPw(d.username||'');
  if(d.cmd==='delUser') delUser(d.username||'');
});

async function doLogin(){
  try {
    const u=document.getElementById('lu').value, p=document.getElementById('lp').value;
    await api('POST','/api/login',{username:u,password:p});
    ME = await api('GET','/api/me');
    render();
  } catch(e){ document.getElementById('lmsg').textContent = e.message; }
}
async function logout(){ try{ await api('POST','/api/logout'); }catch{} ME=null; render(); }

const has = (cap) => ME && ME.capabilities && ME.capabilities.includes(cap);
const TABS = [
  ['Dashboard','dashboard.view',viewDashboard],
  ['Traffic','traffic.view',viewTraffic],
  ['Analytics','traffic.view',viewAnalytics],
  ['Rule Catalog','catalog.view',viewRuleCatalog],
  ['AGH Managed','catalog.view',viewAGHManaged],
  ['Curation','policy.view',viewCuration],
  ['Policy','policy.view',viewPolicy],
  ['Config','config.view',viewConfig],
  ['Users','users.manage',viewUsers],
  ['Audit','audit.view',viewAudit],
];
let CUR = 'Dashboard';

function render(){
  const login=document.getElementById('login'), app=document.getElementById('app');
  if(!ME){ login.classList.remove('hidden'); app.classList.add('hidden'); return; }
  login.classList.add('hidden'); app.classList.remove('hidden');
  document.getElementById('who').textContent = ME.username+' · '+ME.role;
  const nav=document.getElementById('nav'); nav.innerHTML='';
  TABS.filter(t=>has(t[1])).forEach(t=>{
    const b=document.createElement('button'); b.textContent=t[0];
    if(t[0]===CUR) b.className='active';
    b.onclick=()=>{ CUR=t[0]; render(); };
    nav.appendChild(b);
  });
  const tab = TABS.find(t=>t[0]===CUR) || TABS[0];
  document.getElementById('view').innerHTML='';
  tab[2](document.getElementById('view'));
  if(ME.must_change) alert('Please change your temporary password (Users tab / your account).');
}

async function viewDashboard(v){
  const d = await api('GET','/api/dashboard');
  const temp = Object.entries(d.temp_allows||{}).map(([k,t])=>`${esc(k)} → ${esc(new Date(t).toLocaleTimeString())}`).join('<br>')||'<small>none</small>';
  const lis = Object.entries(d.listeners||{}).map(([k,val])=>`<div>${esc(k)}</div><div>${esc(val)}</div>`).join('');
  v.appendChild(el(`<div class="card"><h2>Status</h2><div class="kv">
    <div>version</div><div>${esc(d.version)}</div>
    <div>policy rules</div><div>${d.policy_rules}</div>
    <div>cert key type</div><div>${esc(d.cert_key_type)}</div>
    <div>cert fingerprint</div><div><small>${esc((d.cert_fingerprint||'').slice(0,32))}…</small></div>
    <div>admin users</div><div>${d.users}</div>
    ${lis}
  </div></div>`));
  v.appendChild(el(`<div class="card"><h2>Temporary allows</h2><div>${temp}</div>
    <div class="row" style="margin-top:12px">
      <input id="ta-d" placeholder="domain"><input id="ta-m" type="number" value="15" style="width:80px">min
      <button class="act" onclick="tempAllow()">Allow (pass-through)</button>
    </div></div>`));
  if(has('killswitch.execute'))
    v.appendChild(el(`<div class="card"><h2>Emergency</h2>
      <button class="act danger" onclick="killswitch()">Execute kill-switch (remove AGH rewrites)</button></div>`));
}
async function tempAllow(){ try{
  await api('POST','/api/allow',{domain:document.getElementById('ta-d').value,minutes:+document.getElementById('ta-m').value});
  render();
}catch(e){ alert(e.message);} }
async function killswitch(){ if(!confirm('Remove all cushion AGH rewrites and revert to normal resolution?'))return;
  try{ const r=await api('POST','/api/killswitch'); alert(r.status);}catch(e){alert(e.message);} }

async function viewTraffic(v){
  v.appendChild(el(`<div class="card"><h2>Live traffic <small>(redacted)</small></h2>
    <div class="grid"><table><thead><tr><th>time</th><th>domain</th><th>path</th><th>method</th><th>action</th><th>rule</th><th>catalog</th><th>status</th><th>bytes</th><th></th></tr></thead>
    <tbody id="tbody"></tbody></table></div></div>`));
  const tb=document.getElementById('tbody');
  const add=(r)=>{ const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(new Date(r.time).toLocaleTimeString())}</td><td>${esc(r.domain)}</td><td>${esc(r.path)}</td>
      <td>${esc(r.method)}</td><td class="a-${esc(r.action)}">${esc(r.action)}</td><td>${esc(r.rule||'')}</td><td>${esc(r.category||r.catalog_id||'')}</td><td>${r.status}</td><td>${r.bytes}</td>
      <td></td>`;
    const b=document.createElement('button');
    b.className='act'; b.textContent='triage'; b.dataset.cmd='triage';
    b.dataset.domain=r.domain||''; b.dataset.path=r.path||'';
    tr.lastElementChild.appendChild(b);
    tb.prepend(tr); while(tb.children.length>300) tb.removeChild(tb.lastChild); };
  (await api('GET','/api/traffic')).slice(-100).forEach(add);
  const es=new EventSource('/api/traffic/stream');
  es.onmessage=(e)=>{ try{ add(JSON.parse(e.data)); }catch{} };
  v._cleanup=()=>es.close();
}

async function triage(domain,path){
  const q=new URLSearchParams({domain,path});
  const r=await api('GET','/api/triage/context?'+q.toString());
  alert(JSON.stringify(r,null,2));
}

async function viewAnalytics(v){
  const s=await api('GET','/api/analytics/summary');
  const domains=await api('GET','/api/analytics/domains');
  const rules=await api('GET','/api/analytics/rules');
  const cat=s.catalog||{};
  v.appendChild(el(`<div class="card"><h2>Analytics</h2><div class="kv">
    <div>log mode</div><div>${esc(s.log_mode)}</div>
    <div>requests</div><div>${s.total||0}</div>
    <div>bytes</div><div>${s.bytes||0}</div>
    <div>catalog entries</div><div>${cat.total||0}</div>
  </div></div>`));
  v.appendChild(el(`<div class="card"><h2>Top domains</h2>${rankTable(domains)}</div>`));
  v.appendChild(el(`<div class="card"><h2>Top rules</h2>${rankTable(rules)}</div>`));
  v.appendChild(el(`<div class="card"><h2>Catalog classifications</h2><div class="grid"><table><tbody>
    <tr><th>category</th><td>${esc(JSON.stringify(cat.by_category||{}))}</td></tr>
    <tr><th>risk</th><td>${esc(JSON.stringify(cat.by_risk||{}))}</td></tr>
    <tr><th>review</th><td>${esc(JSON.stringify(cat.by_review_status||{}))}</td></tr>
    <tr><th>source</th><td>${esc(JSON.stringify(cat.by_source_type||{}))}</td></tr>
    <tr><th>resource</th><td>${esc(JSON.stringify(cat.by_resource_type||{}))}</td></tr>
    <tr><th>expected catalog</th><td>${esc(JSON.stringify(cat.by_expected_catalog||{}))}</td></tr>
  </tbody></table></div></div>`));
  v.appendChild(el(`<div class="card"><h2>False-positive candidates</h2>${catalogRows(cat.high_unverified||[])}</div>`));
  v.appendChild(el(`<div class="card"><h2>JS stub candidates</h2>${catalogRows(cat.js_stub_candidates||[])}</div>`));
  v.appendChild(el(`<div class="card"><h2>CNAME candidates</h2>${catalogRows(cat.cname_candidates||[])}</div>`));
}
function rankTable(rows){
  rows=rows||[];
  return `<div class="grid"><table><thead><tr><th>item</th><th>count</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.key)}</td><td>${r.count}</td></tr>`).join('')}</tbody></table></div>`;
}

async function viewRuleCatalog(v){
  const st=await api('GET','/api/agh-sync/status');
  const rows=(await api('GET','/api/rule-catalog')).entries||[];
  v.appendChild(el(`<div class="card"><h2>Rule Catalog</h2><div class="row">
    <span class="pill">${rows.length} entries</span><span class="pill">last sync ${esc(st.last_success?new Date(st.last_success).toLocaleString():'never')}</span>
    ${has('agh.manage')?'<button class="act" onclick="runSync()">Run AGH sync</button>':''}
  </div></div>`));
  v.appendChild(el(`<div class="card"><div class="grid"><table><thead><tr><th>domain</th><th>path</th><th>category</th><th>risk</th><th>review</th><th>verified</th><th>source</th><th>expected</th><th></th></tr></thead><tbody>
    ${rows.slice(0,500).map(r=>`<tr><td>${esc(r.match?.domain)}</td><td>${esc(r.match?.path||'')}</td><td>${esc(r.category)}</td><td>${esc(r.risk)}</td><td>${esc(r.review_status)}</td><td>${r.verified?'yes':'no'}</td><td>${esc(r.source?.type)}</td><td>${esc(r.expected_catalog||'')}</td>
    <td>${catalogActions(r)}</td></tr>`).join('')}
  </tbody></table></div></div>`));
}
async function runSync(){ try{ const r=await api('POST','/api/agh-sync/run'); alert(JSON.stringify(r,null,2)); render(); }catch(e){ alert(e.message);} }
async function reviewRule(id,status,verified){ try{ await api('POST','/api/rule-catalog/'+id+'/review',{review_status:status,verified}); render(); }catch(e){ alert(e.message);} }
async function promoteRule(id){ try{ await api('POST','/api/rule-catalog/'+id+'/promote'); render(); }catch(e){ alert(e.message);} }
async function downgradeRule(id){ try{ await api('POST','/api/rule-catalog/'+id+'/downgrade'); render(); }catch(e){ alert(e.message);} }
async function tempAllowDomain(domain){ try{ await api('POST','/api/triage/temp-allow',{domain,minutes:15}); render(); }catch(e){ alert(e.message);} }
async function permanentAllowDomain(domain,path){ try{ const r=await api('POST','/api/triage/permanent-allow',{domain,path,action:'forward-asis'}); alert(r.note||'saved'); }catch(e){ alert(e.message);} }
async function rewriteCandidate(id){ try{ const r=await api('POST','/api/agh/rewrite-candidate',{id}); alert(JSON.stringify(r,null,2)); }catch(e){ alert(e.message);} }
function catalogActions(r){
  if(!has('catalog.edit') && !has('allow.temp')) return '';
  const id=esc(r.id), domain=esc(r.match?.domain||''), path=esc(r.match?.path||'');
  let b='';
  if(has('catalog.edit')) b+=`<button class="act" data-cmd="promoteRule" data-id="${id}">promote</button><button class="act" data-cmd="downgradeRule" data-id="${id}">downgrade</button>`;
  if(has('allow.temp')) b+=`<button class="act" data-cmd="tempAllowDomain" data-domain="${domain}">temp allow</button>`;
  if(has('policy.edit')) b+=`<button class="act" data-cmd="permanentAllowDomain" data-domain="${domain}" data-path="${path}">permanent</button>`;
  if(has('agh.manage')) b+=`<button class="act" data-cmd="rewriteCandidate" data-id="${id}">AGH candidate</button>`;
  return b;
}
function catalogRows(rows){
  rows=rows||[];
  return `<div class="grid"><table><thead><tr><th>domain</th><th>resource</th><th>risk</th><th>review</th><th>expected</th><th>stub</th><th>cname</th><th></th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${esc(r.match?.domain)}</td><td>${esc(r.resource_type||'')}</td><td>${esc(r.risk||'')}</td><td>${esc(r.review_status||'')}</td><td>${esc(r.expected_catalog||'')}</td><td>${esc(r.stub_template||'')}</td><td>${esc(r.cname_target||'')}</td><td>${catalogActions(r)}</td></tr>`).join('')}
  </tbody></table></div>`;
}

async function viewAGHManaged(v){
  const status=await api('GET','/api/agh/rewrite-feed/status');
  const sources=(await api('GET','/api/agh/sources')).sources||[];
  const conflicts=(await api('GET','/api/agh/managed-catalog/conflicts')).conflicts||[];
  const rows=(await api('GET','/api/agh/managed-catalog')).entries||[];
  window.AGH_MANAGED_SOURCES=sources;
  v.appendChild(el(`<div class="card"><h2>AGH Managed Overview</h2><div class="kv">
    <div>feed path</div><div>${esc(status.feed_path||'/agh/managed-rewrites.txt')}</div>
    <div>enabled</div><div>${status.enabled?'yes':'no'}</div>
    <div>emergency empty</div><div>${status.emergency_empty?'yes':'no'}</div>
    <div>target mode</div><div>${esc(status.target_mode||'')}</div>
    <div>target name</div><div>${esc(status.target_name||'')}</div>
    <div>resolved IPs</div><div>${esc((status.resolved_ips||[]).join(', ')||'none')}</div>
    <div>target cache</div><div>${status.target_cache_used?'stale cache in use':'fresh or not needed'}</div>
    <div>feed items</div><div>${status.item_count||0} included / ${status.excluded_count||0} excluded</div>
    <div>unresolved conflicts</div><div>${status.conflict_count||0}</div>
    <div>source health</div><div>${status.pending_sources||0} pending / ${status.stale_sources||0} stale</div>
    <div>last source sync</div><div>${esc(status.last_source_sync?new Date(status.last_source_sync).toLocaleString():'never')}</div>
    <div>last generated</div><div>${esc(status.last_generated?new Date(status.last_generated).toLocaleString():'never')}</div>
    <div>last resolve error</div><div>${esc(status.last_resolve_error||'')}</div>
  </div>
  <div class="row" style="margin-top:12px">
    <button class="act" onclick="previewManagedFeed()">Preview feed</button>
    ${has('agh.manage')?`<button class="act" onclick="refreshManagedTarget()">Refresh target</button>`:''}
    ${has('agh.manage')?`<button class="act danger" onclick="setEmergencyEmpty(${!status.emergency_empty})">${status.emergency_empty?'Disable':'Enable'} emergency empty</button>`:''}
  </div>
  <pre id="agh-feed" style="white-space:pre-wrap;max-height:260px;overflow:auto"></pre>
  <div id="agh-feed-items"></div></div>`));
  v.appendChild(el(`<div class="card"><h2>Conflicts</h2>
    <div class="grid" style="margin-top:10px"><table><thead><tr><th>domain</th><th>path</th><th>reason</th><th>sources</th><th>entries</th><th></th></tr></thead><tbody>
    ${conflicts.slice(0,200).map(c=>`<tr><td>${esc(c.domain)}</td><td>${esc(c.path||'')}</td><td>${esc((c.reasons||[]).join(', '))}</td><td>${esc((c.source_ids||[]).join(','))}</td><td>${esc((c.entries||[]).map(e=>`${e.category||''}/${e.review_status||''}/${e.rewrite_enabled?'rewrite':'no-rewrite'}`).join(' | '))}</td>
    <td>${has('agh.manage')?`<button class="act" data-cmd="resolveManagedConflict" data-id="${esc(c.id)}" data-action="disable">disable rewrite</button><button class="act" data-cmd="resolveManagedConflict" data-id="${esc(c.id)}" data-action="needs_test">needs test</button><button class="act" data-cmd="resolveManagedConflict" data-id="${esc(c.id)}" data-action="allow_exception">allow exception wins</button>`:''}</td></tr>`).join('')}
    </tbody></table></div></div>`));
  v.appendChild(el(`<div class="card"><h2>Sources</h2>
    ${has('agh.manage')?`<div class="row">
      <select id="agh-src-type"><option value="filter_url">filter URL</option><option value="manual">manual</option></select>
      <input id="agh-src-name" placeholder="name">
      <input id="agh-src-url" placeholder="filter URL" style="min-width:320px">
      <input id="agh-src-interval" placeholder="sync interval" value="12h" style="width:110px">
      <textarea id="agh-src-content" placeholder="manual domains or rules" style="min-height:80px"></textarea>
      <button class="act" onclick="addManagedSource()">Add source</button>
    </div>`:''}
    <div class="grid" style="margin-top:10px"><table><thead><tr><th>name</th><th>type</th><th>enabled</th><th>entries</th><th>diff</th><th>last success</th><th>next</th><th>last error</th><th></th></tr></thead><tbody>
    ${sources.map(s=>`<tr><td>${esc(s.name||s.id)}</td><td>${esc(s.type)}</td><td>${s.enabled?'yes':'paused'}</td><td>${s.entries||0}</td><td>+${s.added||0} -${s.removed||0} ~${s.changed||0}</td><td>${esc(s.last_success?new Date(s.last_success).toLocaleString():'')}</td><td>${esc(s.next_sync?new Date(s.next_sync).toLocaleString():'')}</td><td>${esc(s.last_error||'')}</td>
    <td>${has('agh.manage')?`${s.pending_review?`<button class="act" data-cmd="pendingManagedSource" data-id="${esc(s.id)}">diff</button><button class="act" data-cmd="approveManagedSource" data-id="${esc(s.id)}">approve (+${s.added||0} -${s.removed||0} ~${s.changed||0})</button><button class="act danger" data-cmd="rejectManagedSource" data-id="${esc(s.id)}">reject</button>`:''}<button class="act" data-cmd="previewManagedSource" data-id="${esc(s.id)}">preview</button><button class="act" data-cmd="syncManagedSource" data-id="${esc(s.id)}">sync</button><button class="act" data-cmd="toggleManagedSource" data-id="${esc(s.id)}" data-enabled="${!s.enabled}">${s.enabled?'pause':'resume'}</button><button class="act danger" data-cmd="deleteManagedSource" data-id="${esc(s.id)}">delete</button>`:''}</td></tr>`).join('')}
    </tbody></table></div><pre id="agh-source-detail" style="white-space:pre-wrap;max-height:220px;overflow:auto"></pre></div>`));
  v.appendChild(el(`<div class="card"><h2>Catalog</h2><div class="row"><input id="agh-cat-filter" oninput="filterManagedCatalog()" placeholder="filter domain/source/category/review"></div><div class="grid" style="margin-top:10px"><table><thead><tr><th>domain</th><th>source</th><th>category</th><th>resource</th><th>review</th><th>confidence</th><th>rewrite</th><th>reason</th><th></th></tr></thead><tbody>
    ${rows.slice(0,500).map(r=>`<tr data-search="${esc([r.match?.domain,(r.source_ids||[]).join(','),r.category,r.resource_type,r.review_status,r.confidence].join(' ').toLowerCase())}"><td>${esc(r.match?.domain)}</td><td>${esc((r.source_ids||[]).join(','))}</td><td>${esc(r.category)}</td><td>${esc(r.resource_type)}</td><td>${esc(r.review_status)}</td><td>${esc(r.confidence)}</td><td>${r.rewrite_enabled?'yes':'no'}</td><td>${esc(r.rewrite_reason||'')}</td>
    <td>${has('agh.manage')?`<button class="act" data-cmd="managedRewrite" data-id="${esc(r.id)}" data-enabled="${!r.rewrite_enabled}">${r.rewrite_enabled?'disable':'enable'}</button>`:''}</td></tr>`).join('')}
    </tbody></table></div></div>`));
}
async function addManagedSource(){ try{
  const type=document.getElementById('agh-src-type').value;
  const body={type,name:document.getElementById('agh-src-name').value,enabled:true,sync_interval:document.getElementById('agh-src-interval').value};
  if(type==='manual') body.content=document.getElementById('agh-src-content').value;
  else body.url=document.getElementById('agh-src-url').value;
  await api('POST','/api/agh/sources',body);
  render();
}catch(e){ alert(e.message);} }
async function syncManagedSource(id){ try{ await api('POST','/api/agh/sources/'+id+'/sync'); render(); }catch(e){ alert(e.message);} }
async function previewManagedSource(id){ try{ const s=(window.AGH_MANAGED_SOURCES||[]).find(x=>x.id===id); const r=await api('POST','/api/agh/sources/preview',s); document.getElementById('agh-source-detail').textContent=JSON.stringify({source:r.source,entries:(r.entries||[]).slice(0,50)},null,2); }catch(e){ alert(e.message);} }
async function pendingManagedSource(id){ try{ const r=await api('GET','/api/agh/sources/'+id+'/pending-diff'); document.getElementById('agh-source-detail').textContent=JSON.stringify(r,null,2); }catch(e){ alert(e.message);} }
async function toggleManagedSource(id,on){ try{ const s=(window.AGH_MANAGED_SOURCES||[]).find(x=>x.id===id); if(!s) throw new Error('source not found'); s.enabled=on; await api('PUT','/api/agh/sources/'+id,s); render(); }catch(e){ alert(e.message);} }
async function approveManagedSource(id){ try{ await api('POST','/api/agh/sources/'+id+'/approve'); render(); }catch(e){ alert(e.message);} }
async function rejectManagedSource(id){ try{ await api('POST','/api/agh/sources/'+id+'/reject'); render(); }catch(e){ alert(e.message);} }
async function deleteManagedSource(id){ if(!confirm('Delete source '+id+'?'))return; try{ await api('DELETE','/api/agh/sources/'+id); render(); }catch(e){ alert(e.message);} }
async function setManagedRewrite(id,on){ try{ await api('PATCH','/api/agh/managed-catalog/'+id,{rewrite_enabled:on,rewrite_reason:on?'manual enable':'manual disable'}); render(); }catch(e){ alert(e.message);} }
async function resolveManagedConflict(id,action){ try{
  let body={};
  if(action==='disable') body={rewrite_enabled:false,rewrite_reason:'conflict resolution'};
  if(action==='needs_test') body={review_status:'needs_test',rewrite_reason:'conflict needs test'};
  if(action==='allow_exception') body={category:'allow_exception',review_status:'approved',rewrite_enabled:false,rewrite_reason:'allow exception wins'};
  await api('POST','/api/agh/managed-catalog/conflicts/'+id+'/resolve',body);
  render();
}catch(e){ alert(e.message);} }
async function setEmergencyEmpty(on){ try{ await api('POST','/api/agh/rewrite-feed/emergency-empty',{enabled:on}); render(); }catch(e){ alert(e.message);} }
async function refreshManagedTarget(){ try{ const r=await api('POST','/api/agh/rewrite-feed/refresh-target'); if(r.error) alert(r.error); render(); }catch(e){ alert(e.message);} }
async function previewManagedFeed(){ try{ const p=await api('GET','/api/agh/rewrite-feed/preview'); document.getElementById('agh-feed').textContent=p.lines||''; document.getElementById('agh-feed-items').innerHTML=`<div class="grid"><table><thead><tr><th>domain</th><th>included</th><th>reason</th><th>source</th></tr></thead><tbody>${(p.items||[]).slice(0,500).map(i=>`<tr><td>${esc(i.domain)}</td><td>${i.included?'yes':'no'}</td><td>${esc(i.reason)}</td><td>${esc((i.source_ids||[]).join(','))}</td></tr>`).join('')}</tbody></table></div>`; }catch(e){ alert(e.message);} }
function filterManagedCatalog(){ const q=(document.getElementById('agh-cat-filter')?.value||'').toLowerCase(); document.querySelectorAll('tr[data-search]').forEach(tr=>{ tr.style.display=tr.dataset.search.includes(q)?'':'none'; }); }

async function viewCuration(v){
  const rows=await api('GET','/api/curation');
  v.appendChild(el(`<div class="card"><h2>Curation candidates <small>(unmatched domains/paths)</small></h2>
    <div class="grid"><table><thead><tr><th>count</th><th>domain</th><th>path</th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td>${r.Count}</td><td>${esc(r.Domain)}</td><td>${esc(r.Path)}</td></tr>`).join('')}
    </tbody></table></div></div>`));
}

async function viewPolicy(v){
  const list=await api('GET','/api/policy');
  const canEdit=has('policy.edit');
  v.appendChild(el(`<div class="card"><h2>Policy files</h2>
    <div class="row"><select id="pf">${(list.files||[]).map(f=>`<option>${esc(f)}</option>`).join('')}</select>
    <button class="act" onclick="loadPolicy()">Open</button></div>
    <textarea id="pc" ${canEdit?'':'readonly'} style="margin-top:10px"></textarea>
    ${canEdit?'<div class="row"><button class="act" onclick="savePolicy()">Save</button><button class="act" onclick="reload()">Apply (reload)</button><span id="pmsg"></span></div>':''}
  </div>`));
  if((list.files||[]).length) loadPolicy();
}
async function loadPolicy(){ const n=document.getElementById('pf').value; const r=await api('GET','/api/policy/'+n); document.getElementById('pc').value=r.content; }
async function savePolicy(){ try{ const n=document.getElementById('pf').value;
  const r=await api('PUT','/api/policy/'+n,{content:document.getElementById('pc').value});
  document.getElementById('pmsg').textContent=r.note||'saved'; }catch(e){ document.getElementById('pmsg').textContent=e.message; } }
async function reload(){ try{ const r=await api('POST','/api/reload'); alert('reloaded'); }catch(e){ alert(e.message);} }

async function viewConfig(v){
  const r=await api('GET','/api/config'); const canEdit=has('config.edit');
  v.appendChild(el(`<div class="card"><h2>Config <small>${esc(r.path)}</small></h2>
    <textarea id="cc" ${canEdit?'':'readonly'}>${esc(r.content)}</textarea>
    ${canEdit?'<div class="row"><button class="act" onclick="saveConfig()">Save</button><small>restart-required fields need a service restart</small><span id="cmsg"></span></div>':''}
  </div>`));
}
async function saveConfig(){ try{ const r=await api('PUT','/api/config',{content:document.getElementById('cc').value});
  document.getElementById('cmsg').textContent=r.note||'saved'; }catch(e){ document.getElementById('cmsg').textContent=e.message; } }

async function viewUsers(v){
  const users=await api('GET','/api/users');
  v.appendChild(el(`<div class="card"><h2>Users</h2>
    <div class="grid"><table><thead><tr><th>username</th><th>role</th><th>disabled</th><th></th></tr></thead><tbody>
    ${users.map(u=>`<tr><td>${esc(u.username)}</td><td>${esc(u.role)}</td><td>${u.disabled?'yes':''}</td>
      <td><button class="act" data-cmd="resetPw" data-username="${esc(u.username)}">reset pw</button>
      <button class="act danger" data-cmd="delUser" data-username="${esc(u.username)}">delete</button></td></tr>`).join('')}
    </tbody></table></div>
    <h2 style="margin-top:16px">Add user</h2>
    <div class="row"><input id="nu" placeholder="username"><input id="np" type="password" placeholder="password (>=8)">
    <select id="nr"><option>viewer</option><option>editor</option><option>admin</option></select>
    <button class="act" onclick="addUser()">Create</button></div>
    <h2 style="margin-top:16px">Change my password</h2>
    <div class="row"><input id="op" type="password" placeholder="old"><input id="mp" type="password" placeholder="new (>=8)">
    <button class="act" onclick="changePw()">Update</button></div>
  </div>`));
}
async function addUser(){ try{ await api('POST','/api/users',{username:document.getElementById('nu').value,password:document.getElementById('np').value,role:document.getElementById('nr').value}); render(); }catch(e){ alert(e.message);} }
async function delUser(n){ if(!confirm('Delete '+n+'?'))return; try{ await api('DELETE','/api/users/'+n); render(); }catch(e){ alert(e.message);} }
async function resetPw(n){ const p=prompt('New password for '+n+' (>=8):'); if(!p)return; try{ await api('POST','/api/users/'+n+'/password',{password:p}); alert('done'); }catch(e){ alert(e.message);} }
async function changePw(){ try{ await api('POST','/api/me/password',{old:document.getElementById('op').value,new:document.getElementById('mp').value}); alert('password changed'); }catch(e){ alert(e.message);} }

async function viewAudit(v){
  const rows=await api('GET','/api/audit');
  v.appendChild(el(`<div class="card"><h2>Audit log</h2><div class="grid"><table><thead><tr><th>time</th><th>actor</th><th>action</th><th>detail</th></tr></thead><tbody>
    ${rows.map(a=>`<tr><td>${esc(new Date(a.time).toLocaleString())}</td><td>${esc(a.actor)}</td><td>${esc(a.action)}</td><td>${esc(a.detail)}</td></tr>`).join('')}
    </tbody></table></div></div>`));
}

(async function init(){
  try{ ME=await api('GET','/api/me'); }catch{}
  if(!ME){ try{ const ai=await api('GET','/api/authinfo'); if(ai.oidc) document.getElementById('sso').classList.remove('hidden'); }catch{} }
  render();
})();
</script>
</body>
</html>
